<script type="text/babel" data-presets="react">
const { useState, useMemo, useEffect } = React;
const { ResponsiveContainer, RadarChart, PolarGrid, PolarAngleAxis, PolarRadiusAxis, Radar, Tooltip, BarChart, Bar, XAxis, YAxis, CartesianGrid } = Recharts;

/* ============================================================
   ROLES & ARCHETYPES
   ============================================================ */
const ARCHETYPES = {
  incumbent_fi: { label:"Incumbent FI", desc:"Issuer / acquirer with scale, legacy stack, deposit franchise" },
  challenger:   { label:"Challenger / Fintech", desc:"Cloud-native, narrow product, growth over margin" },
  acquiring:    { label:"Acquiring value chain", desc:"Acquirer / PSP / ISO / ISV / orchestration" },
  network:      { label:"Network / wallet", desc:"Schemes, mobile wallets, BNPL networks" },
  merchant:     { label:"Merchant", desc:"Sells the goods, pays the cost of acceptance" },
  regulator:    { label:"Regulator / policy", desc:"Sets rules, mandates transparency, balances welfare" },
  investor:     { label:"Investor / advisor", desc:"VC, PE, consultant, operator-investor" },
};

const ROLES = [
  { id:"large_fi",   label:"Large FI / Tier-1 bank",        arch:"incumbent_fi" },
  { id:"mid_fi",     label:"Mid-size / regional bank",      arch:"incumbent_fi" },
  { id:"mutual",     label:"Mutual / customer-owned bank",  arch:"incumbent_fi" },

  { id:"bnpl",       label:"BNPL provider",                 arch:"network" },
  { id:"acquirer",   label:"Acquirer",                      arch:"acquiring" },
  { id:"psp",        label:"PSP / gateway",                 arch:"acquiring" },
  { id:"iso_isv",    label:"ISO / ISV / orchestrator",      arch:"acquiring" },
  { id:"scheme",     label:"Card scheme (Visa/MC/eftpos)",  arch:"network" },
  { id:"wallet",     label:"Mobile wallet (Apple/Google)",  arch:"network" },

  { id:"merch_smb",  label:"Merchant, SMB",                arch:"merchant" },
  { id:"rba",        label:"Regulator (RBA / ACCC / Treasury)", arch:"regulator" },
  { id:"advocate",   label:"Public policy / consumer advocate",  arch:"regulator" },
  { id:"vc",         label:"Venture capital",               arch:"investor" },
  { id:"pe",         label:"Private equity",                arch:"investor" },
  { id:"consultant", label:"Strategy consultant",           arch:"investor" },
  { id:"operator",   label:"Payments operator / professional", arch:"investor" },
  { id:"academic",   label:"Academic / researcher",         arch:"investor" },
];

/* ============================================================
   KPIs, universal outcome dimensions
   ============================================================ */
const KPIS = [
  { id:"revenue",     label:"Revenue / margin" },
  { id:"cost",        label:"Cost base" },
  { id:"share",       label:"Market share" },
  { id:"risk",        label:"Risk / fraud exposure" },
  { id:"innovation",  label:"Innovation velocity" },
  { id:"welfare",     label:"Consumer welfare" },
  { id:"reg",         label:"Regulatory pressure" },
  { id:"option",      label:"Strategic optionality" },
];

/* For each role-archetype, how much each KPI matters (0..1) and the *sign* of "good".
   Sign tells us whether an increase in that KPI is good (+1) or bad (-1) for that archetype. */
const ROLE_KPI = {
  incumbent_fi: { revenue:[1.0,+1], cost:[0.9,-1], share:[0.9,+1], risk:[0.8,-1], innovation:[0.5,+1], welfare:[0.3,+1], reg:[0.7,-1], option:[0.6,+1] },
  challenger:   { revenue:[0.7,+1], cost:[0.6,-1], share:[1.0,+1], risk:[0.6,-1], innovation:[1.0,+1], welfare:[0.5,+1], reg:[0.5,-1], option:[0.9,+1] },
  acquiring:    { revenue:[1.0,+1], cost:[0.8,-1], share:[0.9,+1], risk:[0.6,-1], innovation:[0.7,+1], welfare:[0.3,+1], reg:[0.6,-1], option:[0.7,+1] },
  network:      { revenue:[1.0,+1], cost:[0.5,-1], share:[1.0,+1], risk:[0.6,-1], innovation:[0.7,+1], welfare:[0.3,+1], reg:[0.9,-1], option:[0.8,+1] },
  merchant:     { revenue:[0.6,+1], cost:[1.0,-1], share:[0.4,+1], risk:[0.5,-1], innovation:[0.4,+1], welfare:[0.6,+1], reg:[0.3,+1], option:[0.5,+1] },
  regulator:    { revenue:[0.2,-1], cost:[0.6,-1], share:[0.4,-1], risk:[0.9,-1], innovation:[0.6,+1], welfare:[1.0,+1], reg:[0.3,+1], option:[0.5,+1] },
  investor:     { revenue:[0.9,+1], cost:[0.6,-1], share:[0.9,+1], risk:[0.6,-1], innovation:[0.9,+1], welfare:[0.4,+1], reg:[0.5,-1], option:[1.0,+1] },
};

/* Time horizon ramp, how much of an effect lands by short / med / long term */
const RAMP = { short:0.35, med:0.75, long:1.0 };

/* ============================================================
   TOPICS
   Each topic:
     id, title, tagline, hero (one-line provocation),
     briefing: { archetype: { opportunity, problem, context } }
     variables: [
       { id, name, unit, anchor, source, min, max, default, weight,
         effects: { kpi: delta }   // delta is the marginal effect per +1 normalized slider unit (-1..+1 from default)
       }
     ]
   ============================================================ */
const TOPICS = [
{
  id:"agentic",
  title:"Agentic Commerce Infrastructure",
  tagline:"Machines that buy, authenticate, and settle without humans in the loop",
  hero:"The credential layer is the bottleneck. Whoever owns it owns agentic commerce.",
  briefing:{
    incumbent_fi:{
      opportunity:"Become the trusted credential issuer for AI agents, extending card-on-file and tokenisation into machine-to-machine commerce.",
      problem:"Legacy auth stacks (3DS, SMS OTP) are not built for non-human actors. If agents settle through fintech rails, the issuer disappears from the transaction.",
      context:"Visa's CTF/VIC/TAP/MPP and Mastercard Agent Pay are already live. Stripe + Tempo deployed MPP in 2025. The question is whether your tokens are agent-ready or whether a fintech intermediates you."
    },
    challenger:{
      opportunity:"Be the agent-native wallet. Skip the legacy auth debt and issue cryptographic credentials designed for AI from day one.",
      problem:"You don't issue scheme credentials and can't easily piggyback on bank-grade KYC for autonomous spend.",
      context:"The race is to be the default 'agent identity' provider. Whoever wins becomes the new card-on-file."
    },
    acquiring:{
      opportunity:"Build the merchant-side rails for agent traffic, orchestration that knows how to route, authenticate, and dispute machine purchases.",
      problem:"Today's risk models assume human intent. Agent traffic looks like fraud to most acquirers.",
      context:"Stripe is already shipping. If you don't have an MPP-equivalent within 18 months you become a commodity gateway."
    },
    network:{
      opportunity:"Re-monetise the rails. Agent transactions create new fee surfaces (credentialing, attestation, dispute mediation) that bypass traditional interchange caps.",
      problem:"If agents standardise on open protocols (MPP, A2A pay), the schemes' rent on the credential layer compresses.",
      context:"This is the biggest scheme repositioning since EMV. The CTF/VIC stack is the bet."
    },
    merchant:{
      opportunity:"Lower CAC. Agents pre-qualify intent, fewer abandoned carts, less paid acquisition leakage.",
      problem:"Refunds, disputes, and consent provenance are unsolved when no human clicks 'buy'.",
      context:"You will be asked to accept agent traffic before the consumer-protection rules catch up."
    },
    regulator:{
      opportunity:"Set the consent and provenance standard before private rails lock in. This is a once-a-decade architectural choice.",
      problem:"No statutory definition of 'authorisation' when an agent acts on a consumer's behalf. Liability is unclear.",
      context:"PSRA reforms (Dec 2025) give the RBA the remit. Mid-2026 consultation should explicitly cover agentic commerce."
    },
    investor:{
      opportunity:"The credential / attestation layer is the most defensible position in agentic commerce. A handful of category winners will emerge.",
      problem:"Hard to underwrite, incumbents have distribution, challengers have product, neither has both.",
      context:"Watch CTF/VIC/MPP adoption curves and the first major agent-driven dispute case."
    }
  },
  variables:[
    { id:"token_ready", name:"% of issuer credentials agent-ready (MPP/CTF compatible)", unit:"%", anchor:"~5% globally today (industry est., 2025)", source:"Visa CTF, Mastercard Agent Pay launch materials", min:0, max:100, default:10, weight:0.95,
      effects:{ revenue:+0.7, share:+0.8, option:+0.9, reg:-0.2, innovation:+0.6 } },
    { id:"agent_share", name:"Share of ecommerce GMV initiated by agents", unit:"%", anchor:"<1% today; analyst est. 15-30% by 2030", source:"BCG / Gartner 2025 agentic commerce notes", min:0, max:60, default:1, weight:0.9,
      effects:{ share:+0.9, revenue:+0.5, risk:+0.6, welfare:+0.3, reg:+0.7 } },
    { id:"dispute_clarity", name:"Legal clarity on agent-authorised disputes", unit:"index 0-100", anchor:"~15 today (no statutory definition)", source:"PSRA 2025 amendments; AG dept analysis", min:0, max:100, default:15, weight:0.7,
      effects:{ risk:-0.7, welfare:+0.6, reg:-0.4, option:+0.4 } },
    { id:"fintech_intermediation", name:"Fintech share of agent settlement flow", unit:"%", anchor:"~70% of pilots route via Stripe/Tempo (2025)", source:"Stripe + Tempo MPP launch", min:0, max:100, default:70, weight:0.75,
      effects:{ revenue:-0.6, share:-0.7, innovation:+0.4, option:-0.5 } },
    { id:"ai_capex", name:"Issuer/acquirer applied-AI capex intensity", unit:"% of opex", anchor:"2 to 4% today (top-quartile FIs)", source:"Celent 2025; bank disclosures", min:0, max:15, default:3, weight:0.6,
      effects:{ cost:+0.4, innovation:+0.8, option:+0.6, share:+0.3 } }
  ]
},
{
  id:"payto",
  title:"NPP / PayTo as a Card Rail Competitor",
  tagline:"Real-time, mandate-based, API-native, and structurally cheaper than cards",
  hero:"PayTo has the bones to disintermediate card rails. The unsolved question is checkout UX.",
  briefing:{
    incumbent_fi:{

    network:{

      context:"EU SEPA Instant + Open Banking already eroded card recurring share, Australia is on the same trajectory."

    merchant:{

  variables:[
    { id:"payto_reach", name:"% of NPP-reachable accounts PayTo-enabled", unit:"%", anchor:"~70% by mid-2025 (NPPA disclosures)", source:"NPP Australia 2025 quarterly", min:0, max:100, default:70, weight:0.85,

      effects:{ share:+0.6, welfare:+0.4, innovation:+0.3 } },
    { id:"merch_savings", name:"Acceptance cost saved vs card", unit:"bps", anchor:"~120bps (1.5% → 0.3%)", source:"RBA cost of acceptance studies 2024-25", min:0, max:200, default:120, weight:0.75,
      effects:{ cost:+0.9, welfare:+0.5, revenue:-0.4 } }
  ]
},
{
  id:"wallets",
  title:"Mobile Wallet Market Power & NFC Access",
  tagline:"Two foreign tech firms run the in-person card rail, and the RBA knows it",
  hero:"40%+ of in-person card transactions now ride Apple Pay or Google Pay. The next review is mid-2026.",
  briefing:{

    network:{

  },
  variables:[
    { id:"wallet_share", name:"Mobile wallet share of in-person card txns", unit:"%", anchor:"~44% (RBA 2025)", source:"RBA Bulletin / Payments Data 2025", min:10, max:90, default:44, weight:0.95,
      effects:{ share:-0.6, revenue:-0.4, cost:+0.3, reg:+0.8, welfare:+0.2 } },
    { id:"nfc_open", name:"NFC openness to third parties", unit:"index 0-100", anchor:"~10 (closed); EU DMA = 80", source:"EU DMA outcomes 2024-25", min:0, max:100, default:10, weight:0.9,
      effects:{ innovation:+0.9, share:+0.7, option:+0.8, reg:-0.5 } },
    { id:"wallet_fee", name:"Wallet fee to issuers", unit:"bps", anchor:"~15bps (estimates; opaque)", source:"Industry estimates; Reuters 2024", min:0, max:50, default:15, weight:0.7,
      effects:{ cost:+0.7, revenue:-0.5, reg:+0.4 } },

/* ============================================================
   ENGINE
   normalized = (slider - default) / (max - default OR default - min)
   for each kpi: contribution = effect[kpi] * normalized * weight * ramp[h]
   role score on kpi = sum over vars of contribution * roleWeight[kpi] * sign
   ============================================================ */
function normalize(v, def, min, max){
  if (v >= def) return (v - def) / Math.max(1e-9, (max - def));
  return (v - def) / Math.max(1e-9, (def - min));
}

function computeOutcomes(topic, sliderState, archetype){
  const roleW = ROLE_KPI[archetype];
  const horizons = ["short","med","long"];
  const out = { short:{}, med:{}, long:{} };
  KPIS.forEach(k => horizons.forEach(h => out[h][k.id] = 0));
  topic.variables.forEach(v => {
    const val = sliderState[v.id] ?? v.default;
    const n = normalize(val, v.default, v.min, v.max);
    horizons.forEach(h => {
      Object.entries(v.effects).forEach(([kpi, eff]) => {
        out[h][kpi] += eff * n * v.weight * RAMP[h];
      });
    });
  });
  // Apply role weights/signs to make a directional "value" per KPI
  const result = { short:{}, med:{}, long:{} };
  horizons.forEach(h => {
    KPIS.forEach(k => {
      const [w, sign] = roleW[k.id];
      // raw effect modulated by how much this role cares; sign tells us "good for this role" mapping
      const raw = out[h][k.id];
      // For "good if up" KPIs, sign=+1; for "good if down" (cost/risk/reg), sign=-1.
      // value = raw * sign * w  → positive value = good for this role
      result[h][k.id] = raw * sign * w;
    });
  });
  return result;
}

function summarize(result){
  // overall score per horizon = sum of KPI values, normalized loosely
  const horizons = ["short","med","long"];
  return horizons.map(h => {
    const vals = Object.values(result[h]);
    const sum = vals.reduce((a,b)=>a+b,0);
    return { horizon:h, score: sum };
  });
}

function App(){
  const [stage, setStage] = useState("landing"); // "landing" | "app"
  const [roleId, setRoleId] = useState("large_fi");
  const [topicId, setTopicId] = useState("agentic");

  const [sliders, setSliders] = useState(()=>{
    const init = {};
    TOPICS.forEach(t=>{ init[t.id]={}; t.variables.forEach(v=> init[t.id][v.id]=v.default); });
    return init;
  });

  if (stage === "landing") {
    return <Landing roleId={roleId} setRoleId={setRoleId} onEnter={()=>setStage("app")} />;
  }
  return <Dashboard
    roleId={roleId} setRoleId={setRoleId}
    topicId={topicId} setTopicId={setTopicId}
    sliders={sliders} setSliders={setSliders}
    onHome={()=>setStage("landing")}
  />;
}

      <div className="landing-bg"></div>
      <div className="landing-grid"></div>
      <div className="relative z-10 max-w-[1100px] mx-auto px-8 pt-12 pb-20">
        {/* Top */}
        <div className="flex items-center justify-between reveal">
          <div className="flex items-center gap-3">
            <div className="w-9 h-9 rounded-xl bg-gradient-to-br from-[#7cf2c8] to-[#5ec2ff]" />
            <div className="font-display text-[15px] tracking-tight">Payments Strategy <span className="ink3">·</span> <span className="ink2">Scenario Engine</span></div>
          </div>
          <div className="text-[11px] ink3 flex items-center gap-2"><span className="pulse-dot"></span> Public-data anchored · Live model</div>
        </div>

        {/* Hero */}
        <div className="mt-28 max-w-3xl">
          <div className="text-[11px] uppercase tracking-[0.25em] ink3 reveal reveal-2">Applied AI × Australian Payments</div>
          <h1 className="font-display text-[64px] md:text-[88px] leading-[0.95] grad-text mt-5 reveal reveal-2">
            Payments strategy,<br/>recomputed in real time.
          </h1>
          <p className="text-[19px] leading-relaxed ink2 mt-8 max-w-2xl reveal reveal-3">
            Ten forward-looking topics in Australian payments. Public-data anchored variables. Move the levers, see the scenario reshape across short, medium and long term, through the lens of <span className="text-white">your role</span> in the ecosystem.
          </p>
        </div>

        {/* Role + CTA */}
        <div className="mt-16 reveal reveal-4">
          <div className="text-[11px] uppercase tracking-[0.2em] ink3 mb-3">Choose your vantage point</div>
          <div className="flex flex-col md:flex-row gap-3 items-stretch md:items-center">
            <div className="relative flex-1 max-w-md">
              <select value={roleId} onChange={e=>setRoleId(e.target.value)}
                className="w-full appearance-none bg-[#0d0f13] border hairline rounded-2xl px-5 py-5 text-[16px] focus:outline-none focus:border-[#7cf2c8] transition pr-12">
                {Object.entries(ARCHETYPES).map(([aid, a]) => (
                  <optgroup key={aid} label={a.label}>
                    {ROLES.filter(r=>r.arch===aid).map(r => <option key={r.id} value={r.id}>{r.label}</option>)}
                  </optgroup>
                ))}
              </select>
              <div className="absolute right-5 top-1/2 -translate-y-1/2 ink3 pointer-events-none">▾</div>
            </div>
            <button onClick={onEnter}
              className="group px-8 py-5 rounded-2xl text-[16px] font-medium text-[#08090b] bg-gradient-to-r from-[#7cf2c8] to-[#5ec2ff] hover:shadow-[0_20px_60px_-20px_rgba(124,242,200,0.6)] transition-all">
              Enter the model <span className="inline-block ml-2 transition-transform group-hover:translate-x-1">→</span>
            </button>
          </div>
        </div>

        {/* Three lines of pitch */}
        <div className="mt-24 grid md:grid-cols-3 gap-10 reveal reveal-5">
          <Pitch num="01" title="Ten topics" body="From agentic commerce and PayTo to scheme fee transparency, BNPL, CDR and AI fraud, the topics defining the next decade of Australian payments."/>
          <Pitch num="02" title="Variables that move" body="Each topic exposes 4 to 5 high-impact levers anchored in RBA, AusPayNet, BIS and EU IFR data. Drag them. The model recomputes."/>
          <Pitch num="03" title="Outcomes by role" body="Same scenario, twenty roles. A regulator and a fintech see the same lever push different KPIs across short, medium and long term."/>
        </div>

        <div className="mt-24 text-center reveal reveal-5">
          <div className="text-[11px] ink3 italic">What was once a $400k consulting engagement is now a sixty-second interaction.</div>
        </div>
      </div>
    </div>
  );
}

function Pitch({num,title,body}){
  return (
    <div>
      <div className="font-mono text-[10px] ink3 tracking-[0.2em]">{num}</div>
      <div className="font-display text-[20px] mt-2 mb-2">{title}</div>
      <div className="text-[13.5px] ink2 leading-relaxed">{body}</div>
    </div>
  );
}

/* ============================================================
   DASHBOARD
   ============================================================ */
function Dashboard({roleId,setRoleId,topicId,setTopicId,sliders,setSliders,onHome}){
  const topic = TOPICS.find(t=>t.id===topicId);
  const role = ROLES.find(r=>r.id===roleId);
  const archetype = role.arch;

  const setSlider = (vid, val) => {
    setSliders(s => ({...s, [topic.id]:{...s[topic.id], [vid]: val}}));
  };
  const reset = () => {
    setSliders(s => {
      const copy = {...s, [topic.id]:{}};
      topic.variables.forEach(v => copy[topic.id][v.id] = v.default);
      return copy;
    });
  };

  const result = useMemo(()=>computeOutcomes(topic, sliders[topic.id], archetype), [topic, sliders, archetype]);
  const briefing = topic.briefing[archetype];

  // top KPI movers per horizon
  const topMovers = (h) => {
    const entries = Object.entries(result[h]).map(([k,v])=>({k, v, label: KPIS.find(x=>x.id===k).label}));
    entries.sort((a,b)=>Math.abs(b.v)-Math.abs(a.v));
    return entries.slice(0,4);
  };

  const horizonScore = (h) => Object.values(result[h]).reduce((a,b)=>a+b,0);

  return (
    <div className="relative z-10 min-h-screen flex">
      {/* LEFT RAIL */}
      <aside className="w-[280px] shrink-0 border-r hairline min-h-screen flex flex-col bg-[#0a0c10]/60">
        <div className="px-6 pt-6 pb-4 border-b hairline">
          <button onClick={onHome} className="flex items-center gap-2 group">
            <div className="w-7 h-7 rounded-lg bg-gradient-to-br from-[#7cf2c8] to-[#5ec2ff]"></div>
            <div className="font-display text-[13px] leading-tight">
              <div>Payments Strategy</div>
              <div className="ink3 text-[10px]">Scenario Engine</div>
            </div>
          </button>
        </div>
        <div className="px-6 pt-5 pb-2 text-[10px] uppercase tracking-[0.2em] ink3">10 topics</div>
        <nav className="flex-1 overflow-y-auto scrollbar">
          {TOPICS.map((t,i) => (
            <div key={t.id} onClick={()=>setTopicId(t.id)}
              className={"rail-item " + (t.id===topicId?"active":"")}>
              <div className="rail-num">{String(i+1).padStart(2,"0")}</div>
              <div className="text-[13px] mt-1 leading-snug text-white/95">{t.title}</div>
            </div>
          ))}
        </nav>
        <div className="border-t hairline px-6 py-5">
          <div className="text-[10px] uppercase tracking-[0.2em] ink3 mb-2">Viewing as</div>
          <select value={roleId} onChange={e=>setRoleId(e.target.value)}
            className="w-full bg-[#0d0f13] border hairline rounded-xl px-3 py-2.5 text-[12.5px] focus:outline-none focus:border-[#7cf2c8] transition">
            {Object.entries(ARCHETYPES).map(([aid, a]) => (
              <optgroup key={aid} label={a.label}>
                {ROLES.filter(r=>r.arch===aid).map(r => <option key={r.id} value={r.id}>{r.label}</option>)}
              </optgroup>
            ))}
          </select>
          <div className="text-[10px] ink3 mt-2">Lens · {ARCHETYPES[archetype].label}</div>
        </div>
      </aside>

      {/* MAIN */}
      <main className="flex-1 min-w-0 px-12 py-10 max-w-[1280px]">
        {/* Topic hero */}
        <div key={topic.id+role.id} className="fade-in">
          <div className="text-[11px] uppercase tracking-[0.22em] ink3 mb-3">{topic.tagline}</div>
          <h1 className="font-display text-[44px] md:text-[54px] leading-[1.02] grad-text max-w-3xl">{topic.title}</h1>
          <p className="mt-5 text-[17px] ink2 max-w-2xl leading-relaxed">{topic.hero}</p>
        </div>

        {/* Briefing, single elegant row */}
        <div className="grid md:grid-cols-3 gap-5 mt-10 fade-in">
          <Brief label="Opportunity" body={briefing.opportunity} accent="#7cf2c8"/>
          <Brief label="Problem"     body={briefing.problem}     accent="#ff6b8a"/>
          <Brief label="Context"     body={briefing.context}     accent="#5ec2ff"/>
        </div>

        {/* Variables */}
        <section className="mt-12">
          <div className="flex items-baseline justify-between mb-6">
            <div>
              <div className="text-[10px] uppercase tracking-[0.22em] ink3">Scenario variables</div>
              <h2 className="font-display text-[26px] mt-1">Move the levers</h2>
            </div>
            <button onClick={reset} className="text-[11px] ink2 hover:text-white transition px-3 py-1.5 rounded-full chip">Reset to baseline</button>
          </div>
          <div className="grid md:grid-cols-2 gap-x-10 gap-y-7">
            {topic.variables.map(v => (
              <BigSlider key={v.id} v={v} value={sliders[topic.id][v.id]} onChange={(val)=>setSlider(v.id, val)} />
            ))}
          </div>
        </section>

        {/* Outcome, three big horizon cards */}
        <section className="mt-16">
          <div className="flex items-baseline justify-between mb-6">
            <div>
              <div className="text-[10px] uppercase tracking-[0.22em] ink3">Outcome surface</div>
              <h2 className="font-display text-[26px] mt-1">How this reshapes your world</h2>
            </div>
            <div className="text-[11px] ink3">Net effect for {role.label}</div>
          </div>
          <div className="grid md:grid-cols-3 gap-5">
            <HorizonCard label="Short term" sub="0 to 12 months" score={horizonScore("short")} movers={topMovers("short")}/>
            <HorizonCard label="Medium term" sub="1 to 3 years" score={horizonScore("med")} movers={topMovers("med")}/>
            <HorizonCard label="Long term" sub="3 to 7 years" score={horizonScore("long")} movers={topMovers("long")}/>
          </div>
        </section>

        <div className="mt-20 pt-8 border-t hairline text-[11px] ink3 flex flex-wrap gap-x-6 gap-y-2 justify-between">
          <div>Sources: RBA, AusPayNet, BIS, Treasury, ACCC, scheme disclosures, EU IFR studies.</div>
          <div>All variables anchored to public data · {TOPICS.length} topics · {ROLES.length} roles · 8 KPIs × 3 horizons</div>
        </div>
      </main>
    </div>
  );
}

function Brief({label, body, accent}){
  return (
    <div className="rounded-2xl p-5 border hairline bg-[rgba(255,255,255,0.018)]">
      <div className="flex items-center gap-2 mb-3">
        <span className="w-1.5 h-1.5 rounded-full" style={{background:accent}}></span>
        <div className="text-[10px] uppercase tracking-[0.2em] ink3">{label}</div>
      </div>
      <p className="text-[13.5px] leading-relaxed text-white/90">{body}</p>
    </div>
  );
}

function fmtVal(v, x){
  if (v.unit === "%" || v.unit === "% opex" || v.unit === "% of opex") return `${Number(x).toFixed(0)}%`;
  if (v.unit === "bps") return `${Number(x).toFixed(0)} bps`;
  if (v.unit === "cents") return `${Number(x).toFixed(2)}¢`;
  if (v.unit === "$m/yr") return `$${Number(x).toFixed(0)}m`;
  if (v.unit === "hours") return `${Number(x).toFixed(0)}h`;
  if (v.unit === "count") return `${Number(x).toFixed(0)}`;
  if (v.unit && v.unit.startsWith("index")) return Number(x).toFixed(0);
  return `${x}`;
}

function BigSlider({v, value, onChange}){
  const delta = value - v.default;
  const direction = Math.abs(delta) < 1e-6 ? "baseline" : (delta > 0 ? "up" : "down");
  const color = direction === "up" ? "#7cf2c8" : direction === "down" ? "#ff6b8a" : "#9aa1ad";
  return (
    <div className="big-slider">
      <div className="flex items-baseline justify-between gap-3">
        <div className="text-[13px] text-white/90 leading-snug max-w-[70%]">{v.name}</div>
        <div className="flex items-center gap-2">
          <div className="num-tick text-[26px] font-display tracking-tight" style={{color}}>{fmtVal(v, value)}</div>
        </div>
      </div>
      <input type="range" min={v.min} max={v.max} step={(v.max-v.min)/200} value={value}
        onChange={e=>onChange(Number(e.target.value))} className="mt-3" />
      <div className="flex items-center justify-between mt-2 text-[10.5px] ink3">
        <div>baseline · <span className="ink2">{fmtVal(v, v.default)}</span></div>
        <div>impact weight · <span className="ink2">{Math.round(v.weight*100)}</span></div>
      </div>
      <div className="text-[10.5px] ink3 mt-1">{v.anchor}</div>
    </div>
  );
}

function HorizonCard({label, sub, score, movers}){
  // map score to color/glow intensity
  const s = Math.max(-6, Math.min(6, score));
  const norm = s / 6; // -1..1
  const good = norm >= 0;
  const intensity = Math.min(1, Math.abs(norm) * 1.4);
  const color = good ? "#7cf2c8" : "#ff6b8a";
  const glowColor = good ? "rgba(124,242,200,1)" : "rgba(255,107,138,1)";
  const verdict = norm > 0.5 ? "Strongly favourable" : norm > 0.15 ? "Favourable" : norm > -0.15 ? "Neutral" : norm > -0.5 ? "Adverse" : "Strongly adverse";
  return (
    <div className="horizon-card" style={{"--gc": glowColor, "--gop": intensity*0.7, borderColor: `rgba(${good?"124,242,200":"255,107,138"},${0.15+intensity*0.4})`}}>
      <div className="glow"></div>
      <div className="relative">
        <div className="flex items-center justify-between">
          <div>
            <div className="text-[10px] uppercase tracking-[0.2em] ink3">{label}</div>
            <div className="font-mono text-[10px] ink3 mt-0.5">{sub}</div>
          </div>
          <div className="text-[10px] uppercase tracking-[0.18em]" style={{color}}>{verdict}</div>
        </div>
        <div className="horizon-score mt-6" style={{fontSize:`${56 + intensity*16}px`,color}}>
          {score >= 0 ? "+" : ""}{score.toFixed(2)}
        </div>
        <div className="text-[10px] ink3 mt-1">role-weighted net score</div>
        <div className="mt-6 space-y-1">
          {movers.map(m => {
            const w = Math.min(100, Math.abs(m.v)*40);
            const mGood = m.v >= 0;
            return (
              <div key={m.k} className="kpi-mover">
                <div className="ink2 w-[110px] truncate">{m.label}</div>
                <div className="bar">
                  <span style={{
                    left: mGood ? "50%" : `${50-w/2}%`,
                    width: `${w/2}%`,
                    background: mGood ? "linear-gradient(90deg,#7cf2c8,#5ec2ff)" : "linear-gradient(90deg,#ff6b8a,#ffb86b)"
                  }}></span>
                  <span style={{left:"50%",width:"1px",background:"rgba(255,255,255,0.12)"}}></span>
                </div>
                <div className="font-mono num-tick w-9 text-right" style={{color:mGood?"#7cf2c8":"#ff6b8a"}}>{m.v.toFixed(2)}</div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
